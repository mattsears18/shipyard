name: Bug Report
description: Something isn't working as expected
title: "bug: <short description>"
labels: ["bug", "P2"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please fill out the sections below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug — what you saw vs what you expected
      placeholder: "When I ran X, Y happened. I expected Z."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Step-by-step instructions to reproduce
      placeholder: |
        1. Run /shipyard:do-work
        2. ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Links to what shipyard did
      description: Link any PR(s), issue(s), commit(s), or session that shows the bug. For an autonomous tool a link to what it produced is usually higher-signal than a prose repro.
      placeholder: "PR: https://github.com/<you>/<repo>/pull/123"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Plugin version, Claude Code version, OS
      placeholder: "shipyard 1.3.44, Claude Code 0.5.0, macOS 14.5"
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: shell
