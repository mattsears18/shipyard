name: Feature Request
description: Suggest a new feature or improvement
title: "feat: <short description>"
labels: ["enhancement", "feature-request", "P2"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user-facing problem, not the proposed solution
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: How would you like this to work?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else have you tried or considered?
  - type: input
    id: command
    attributes:
      label: Which shipyard command surfaced this?
      description: The command + flags you were running, if any (e.g. /shipyard:do-work, /shipyard:my-turn, /shipyard:do-work --operate).
      placeholder: "/shipyard:do-work"
  - type: textarea
    id: artifacts
    attributes:
      label: Links to what shipyard did
      description: Link any PR(s), issue(s), commit(s), or session that shows the behavior. For an autonomous tool this is usually the most useful thing you can give us.
      placeholder: "PR: https://github.com/<you>/<repo>/pull/123 — it committed Terraform with no real values"
  - type: textarea
    id: stack
    attributes:
      label: Your setup / stack
      description: Relevant context about your repo — language/framework, infra (Terraform, Vercel, Firebase…), CI, anything that shapes the request.
      placeholder: "Expo RN app, infra in Terraform, CI on GitHub Actions"
  - type: input
    id: version
    attributes:
      label: Versions
      description: shipyard plugin version (/shipyard:version) and Claude Code version.
      placeholder: "shipyard 1.23.0, Claude Code 2.x"
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: I'm willing to help implement this
        - label: This blocks something else I'm working on
