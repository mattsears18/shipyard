name: Secret scan

# Runs gitleaks against every push and PR to gate accidentally-committed
# secrets (GitHub PATs, Anthropic/OpenAI keys, AWS access keys, Slack
# tokens, PEM private keys, etc.) before they reach `main`.
#
# Rationale (issue #108): the existing scrubbing in
# `plugins/shipyard/scripts/report-plugin-error.sh` protects the
# auto-reporter pipeline, but only at runtime — it doesn't stop a
# contributor (or me-tomorrow) from pasting a real `.env` value into a
# tracked file. This workflow is the repo-side catch-net.
#
# This is intentionally a separate workflow from
# `external-author-gate.yml` (issue #91, separate trigger and permissions
# model) and from the future combined CI workflow that issues #102
# (shellcheck) and #105 (unit-test runner) will add — separate concern,
# separate file, no shared matrix needed. Splitting keeps each gate
# debuggable in isolation and lets failures be addressed without
# rerunning unrelated jobs.
#
# Security note: actions are pinned by full commit SHA (not floating
# tags) to avoid the supply-chain risk of a tag being repointed at
# malicious code. No event-supplied values (issue titles, PR bodies,
# etc.) are interpolated into `run:` scripts — this workflow only
# invokes pinned actions with static inputs. See
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  # Read-only default — gitleaks needs to clone the repo, nothing else.
  # Pull-request comment posting is not enabled (would require
  # `pull-requests: write`); the failed-check status + the workflow log
  # are sufficient signal that a secret was detected.
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # gitleaks needs the full history for `push` events to scan the
          # incoming commit range. PRs are scanned against the merge base
          # automatically.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Path is relative to the repo root; the action picks it up
          # automatically, but being explicit avoids surprises if the
          # action's default-search path ever changes.
          GITLEAKS_CONFIG: .gitleaks.toml
          # Skip noisy artifact upload — the workflow log already shows
          # findings and the action's exit code gates the merge.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITLEAKS_ENABLE_SUMMARY: true
