# gitleaks config — wired by .github/workflows/secret-scan.yml (issue #108).
#
# Strategy: extend gitleaks' upstream default ruleset and allowlist only the
# intentional test fixtures in `plugins/shipyard/scripts/tests/`. Those
# fixtures EXIST specifically to exercise the runtime secret-scrubbing in
# `scripts/report-plugin-error.sh` — taking them away to silence gitleaks
# would defeat the test suite that the sibling finding #105 wants to wire to
# CI. So gitleaks gets told "skip those specific files" rather than the
# rules getting watered down repo-wide.
#
# NOTE — two distinct scanners, don't conflate them:
#   1. gitleaks (this config) is the COMMITTED-CONTENT scanner — it pulls in
#      gitleaks' upstream default ruleset via [extend] below, which covers a
#      broad shape set (classic + fine-grained GitHub tokens, Slack tokens,
#      Google API keys, AWS keys, PEM private keys, etc.).
#   2. The RUNTIME scrubber in `report-plugin-error.sh`'s `PY_SCRUB` is a
#      separate, narrower pattern set that redacts secrets out of auto-report
#      issue bodies before they're posted publicly. As of issue #402 it
#      covers: classic + fine-grained GitHub tokens (ghp_*, github_pat_*),
#      Anthropic/OpenAI keys (sk-ant-*, sk-*), Slack tokens (xox[baprs]-*),
#      Google API keys (AIza…), AWS access keys (AKIA*), Bearer/Authorization
#      headers, emails, 40+ char hex, and PEM private-key blocks. If you add a
#      shape to one scanner, consider whether the other needs it too — they
#      protect different surfaces (commit history vs. public auto-report).
#
# The `extend` block pulls in gitleaks' default rules verbatim; we only add
# our own allowlist on top.

[extend]
useDefault = true

[allowlist]
description = "Allowlist for intentional test fixtures and pattern-definition files"

# Files that intentionally contain example/dummy tokens used to test the
# in-repo secret-scrubbing logic. Adding a real secret to one of these files
# would be a regression — but gitleaks can't distinguish "real" from
# "example" by shape alone, and AWS's canonical dummy key
# (AKIAIOSFODNN7EXAMPLE) is real-looking enough to trip any pattern match.
# These files are reviewed at PR time alongside the scrubbing code they
# exercise, which is the right human gate for them.
paths = [
    '''plugins/shipyard/scripts/tests/report-plugin-error\.test\.sh''',
    # The scrubbing source itself contains the regex patterns it matches
    # against — those are pattern definitions, not secrets, but a future
    # rule tweak could false-positive on the regex bodies. Pre-emptively
    # allowlist.
    '''plugins/shipyard/scripts/report-plugin-error\.sh''',
    # README documents which token shapes get scrubbed, using their
    # prefixes (ghp_…, sk-ant-…) as illustration. The trailing ellipsis
    # keeps the prefix below gitleaks' length thresholds in practice, but
    # belt-and-suspenders allowlist in case the doc grows.
    '''README\.md''',
]

# Allowlist AWS's published canonical example access key — used by AWS docs
# and SDKs as the "do not use, this is an example" placeholder. Appears in
# the test fixtures referenced above; included here as a stopRegex too in
# case it shows up elsewhere (e.g. CHANGELOG quoting an issue body).
regexes = [
    '''AKIAIOSFODNN7EXAMPLE''',
]
